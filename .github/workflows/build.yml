# Build workflow: main 브랜치 push 시 전체 테스트 + Docker 빌드 및 ghcr.io push
# REQ-INFRA-005, REQ-INFRA-006

name: Build & Push

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kiminbean/voice-to-textnote

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      # 통합 테스트용 Redis 서비스 컨테이너
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff linting
        run: ruff check backend/

      - name: Run tests with coverage
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -m pytest backend/tests/ \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -v

  # REQ-INFRA-005, REQ-INFRA-006: Docker 빌드 및 ghcr.io push
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Docker Buildx: 멀티플랫폼 빌드 및 캐시 지원
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # REQ-INFRA-006: ghcr.io 로그인
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 이미지 태그: latest + 커밋 SHA (고유 버전 식별)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      # REQ-INFRA-005: Docker 이미지 빌드 및 push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 레이어 캐시로 빌드 속도 최적화
          cache-from: type=gha
          cache-to: type=gha,mode=max
