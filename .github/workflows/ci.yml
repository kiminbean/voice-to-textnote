# CI workflow: PR 생성/업데이트 시 테스트, 린팅, 커버리지 검증
# REQ-INFRA-001, REQ-INFRA-002, REQ-INFRA-003, REQ-INFRA-004

name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      # REQ-INFRA-002: 통합 테스트용 Redis 서비스 컨테이너
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      # REQ-INFRA-004: ruff 린팅 검사
      - name: Run ruff linting
        run: ruff check backend/

      # REQ-INFRA-001, REQ-INFRA-003: 테스트 실행 및 커버리지 85% 게이트
      - name: Run tests with coverage
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -m pytest backend/tests/ \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
