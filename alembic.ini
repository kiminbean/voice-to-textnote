# Alembic 설정 파일 - SPEC-DB-001 (REQ-DB-007)
# 실제 DB URL은 alembic/env.py에서 settings.database_url로 오버라이드됩니다

[alembic]
# 마이그레이션 스크립트 경로
script_location = alembic

# 마이그레이션 파일명 형식: 날짜_제목.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# 타임존 설정
timezone = UTC

# 마이그레이션 버전 경로
version_locations = %(here)s/alembic/versions

# 로깅 설정
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
