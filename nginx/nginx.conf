# Nginx 리버스 프록시 설정
# REQ-DOCKER-004: 80/443 포트에서 api:8000으로 프록시
# REQ-DOCKER-005: /metrics 엔드포인트를 내부 네트워크에서만 접근 허용
# REQ-DOCKER-006: gzip 압축, 500MB client_max_body_size, 300s 프록시 타임아웃
# REQ-DOCKER-007: SSL/TLS 인증서 마운트 구조 (주석 처리, 활성화 준비)

# Worker 프로세스 설정
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 로그 포맷 정의
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 성능 최적화
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 보안: 서버 버전 숨기기
    server_tokens off;

    # REQ-DOCKER-006: gzip 압축 설정 (JSON, 텍스트, JavaScript 대상)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 1000;
    gzip_types
        application/json
        application/javascript
        application/x-javascript
        text/plain
        text/css
        text/xml
        text/javascript
        application/xml+rss
        application/atom+xml;

    # REQ-DOCKER-006: 최대 업로드 파일 크기 (500MB - 음성 파일 업로드 지원)
    client_max_body_size 500m;
    client_body_timeout 300s;
    client_header_timeout 60s;

    # API 업스트림 서버 정의
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    # ─── HTTP 서버 (80 포트) ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # REQ-DOCKER-006: 프록시 타임아웃 설정 (STT 처리 시간 고려 300s)
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # 프록시 공통 헤더
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 보안 헤더
        add_header X-Frame-Options         "SAMEORIGIN"    always;
        add_header X-Content-Type-Options  "nosniff"       always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # ─── 메인 API 프록시 ──────────────────────────────────────────────────
        location / {
            proxy_pass http://api_backend;

            # 대용량 요청 버퍼링 설정 (500MB 파일 업로드)
            proxy_request_buffering off;
            proxy_buffering off;
        }

        # REQ-DOCKER-005: /metrics 엔드포인트 - 내부 네트워크에서만 접근 허용
        # Docker 내부 네트워크 대역만 허용 (172.16-31.0.0/12, 10.0.0.0/8)
        location /metrics {
            # Docker 브리지 네트워크 (172.16.0.0/12)
            allow 172.16.0.0/12;
            # Docker 오버레이/사용자 정의 네트워크
            allow 10.0.0.0/8;
            # 로컬호스트 허용
            allow 127.0.0.1;
            # 그 외 모든 외부 접근 차단
            deny all;

            proxy_pass http://api_backend;
        }

        # 헬스체크 엔드포인트 (로드 밸런서/모니터링용)
        location /health {
            proxy_pass http://api_backend;
            # 헬스체크는 로그에 기록하지 않음 (노이즈 감소)
            access_log off;
        }
    }

    # ─── HTTPS 서버 (443 포트) - SSL/TLS 활성화 시 주석 해제 ─────────────────
    # REQ-DOCKER-007: SSL/TLS 인증서 마운트 구조 준비
    #
    # 활성화 방법:
    # 1. SSL 인증서를 ./nginx/ssl/ 디렉토리에 배치
    #    - ./nginx/ssl/server.crt  (인증서)
    #    - ./nginx/ssl/server.key  (개인 키)
    # 2. Let's Encrypt 사용 시:
    #    - ./nginx/ssl/fullchain.pem (인증서 체인)
    #    - ./nginx/ssl/privkey.pem   (개인 키)
    # 3. 아래 server 블록의 주석을 해제
    # 4. server_name에 실제 도메인 입력
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     # SSL 인증서 경로
    #     ssl_certificate     /etc/nginx/ssl/server.crt;
    #     ssl_certificate_key /etc/nginx/ssl/server.key;
    #
    #     # Let's Encrypt 사용 시:
    #     # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    #     # TLS 보안 설정
    #     ssl_protocols       TLSv1.2 TLSv1.3;
