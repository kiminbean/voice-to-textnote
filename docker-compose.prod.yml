# 프로덕션 Docker Compose 설정
# REQ-DOCKER-001: nginx, api, worker, redis, postgres 5개 서비스
# REQ-DOCKER-002: 모든 서비스에 healthcheck + depends_on with conditions 적용
# REQ-DOCKER-003: PostgreSQL 데이터를 named volume(postgres_data)에 보관

services:
  # ─── Nginx 리버스 프록시 ───────────────────────────────────────────────────
  # REQ-DOCKER-004: 80/443 포트에서 api:8000으로 프록시
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # REQ-DOCKER-007: SSL/TLS 인증서 마운트 구조 (활성화 시 주석 해제)
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app_network

  # ─── PostgreSQL 데이터베이스 ────────────────────────────────────────────────
  # REQ-DOCKER-003: named volume postgres_data 사용
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voicenote}
      POSTGRES_USER: ${POSTGRES_USER:-voicenote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      # REQ-DOCKER-003: 영속성 보장을 위한 named volume
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voicenote} -d ${POSTGRES_DB:-voicenote}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app_network

  # ─── Redis 캐시/브로커 ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    # requirepass: 프로덕션에서 반드시 REDIS_PASSWORD 설정 필요
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app_network

  # ─── FastAPI 애플리케이션 ─────────────────────────────────────────────────
  # Nginx가 처리하므로 포트를 외부에 직접 노출하지 않음
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # 컨테이너 내부 서비스 URL 오버라이드
      - ENVIRONMENT=production
      - API_KEYS=${API_KEYS:?API_KEYS is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - LLM_PROVIDER=${LLM_PROVIDER:-zai}
      - ZAI_BASE_URL=${ZAI_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
      - ZAI_API_KEY=${ZAI_API_KEY:?ZAI_API_KEY is required}
      - SUMMARY_MODEL=${SUMMARY_MODEL:-glm-5.2}
      - FIREBASE_CREDENTIALS_PATH=/run/secrets/firebase-service-account.json
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/1
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-voicenote}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-voicenote}
    volumes:
      - ./storage:/app/storage
      - ${FIREBASE_CREDENTIALS_PATH:?FIREBASE_CREDENTIALS_PATH is required}:/run/secrets/firebase-service-account.json:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # api 포트를 외부에 직접 노출하지 않음 - nginx가 담당
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    networks:
      - app_network

  # ─── Celery 워커 ──────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - API_KEYS=${API_KEYS:?API_KEYS is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - LLM_PROVIDER=${LLM_PROVIDER:-zai}
      - ZAI_BASE_URL=${ZAI_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
      - ZAI_API_KEY=${ZAI_API_KEY:?ZAI_API_KEY is required}
      - SUMMARY_MODEL=${SUMMARY_MODEL:-glm-5.2}
      - FIREBASE_CREDENTIALS_PATH=/run/secrets/firebase-service-account.json
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/1
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-voicenote}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-voicenote}
    volumes:
      - ./storage:/app/storage
      - ${FIREBASE_CREDENTIALS_PATH:?FIREBASE_CREDENTIALS_PATH is required}:/run/secrets/firebase-service-account.json:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "backend.workers.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 동시 처리 수를 3개로 제한 (메모리 제약: 24GB)
    command: celery -A backend.workers.celery_app worker --loglevel=warning --concurrency=3
    restart: unless-stopped
    networks:
      - app_network

# ─── Named Volumes ──────────────────────────────────────────────────────────
volumes:
  # REQ-DOCKER-003: PostgreSQL 데이터 영속성 보장
  postgres_data:
  redis_data:

# ─── 내부 네트워크 ────────────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge
