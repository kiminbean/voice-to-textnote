version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - TEMP_DIR=/app/storage/temp
      - RESULTS_DIR=/app/storage/results
    volumes:
      - ./storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - TEMP_DIR=/app/storage/temp
      - RESULTS_DIR=/app/storage/results
    volumes:
      - ./storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    # 동시 처리 수를 3개로 제한 (메모리 제약: 24GB)
    command: celery -A backend.workers.celery_app worker --loglevel=info --concurrency=3

volumes:
  redis_data:
